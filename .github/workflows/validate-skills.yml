name: Validate Skills

on:
  push:
    paths:
      - "drip-skills/**"
      - "scripts/validate-skill.mjs"
      - "registry.json"
      - "project-types.json"
  pull_request:
    paths:
      - "drip-skills/**"
      - "scripts/validate-skill.mjs"
      - "registry.json"
      - "project-types.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate all skills
        run: node scripts/validate-skill.mjs

      - name: Verify registry skills exist at nested paths
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const registry = JSON.parse(fs.readFileSync('registry.json', 'utf8'));
          const missing = registry.filter((entry) => {
            const skillPath = path.join('drip-skills', entry.projectType, entry.name, 'SKILL.md');
            return !fs.existsSync(skillPath);
          });
          if (missing.length) {
            console.error('Registry entries missing on disk:', missing.map((e) => e.name).join(', '));
            process.exit(1);
          }
          console.log('All', registry.length, 'registry skills exist at drip-skills/{projectType}/{name}/.');
          "
